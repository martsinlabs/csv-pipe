name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for OIDC trusted publishing and provenance.
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing over OIDC (no token) needs npm 11.5.1 or newer.
      - name: Use a recent npm
        run: npm install -g npm@latest

      - run: npm ci

      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Verify package
        run: npm run check:package

      # Authenticated by the OIDC trusted publisher configured on npm, so no
      # token is needed. Provenance is attached automatically.
      - name: Publish to npm
        run: npm publish

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
