name: Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run benchmarks
        run: npm run bench
