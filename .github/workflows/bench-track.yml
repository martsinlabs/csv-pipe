name: Benchmark tracking

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

# Serialize with the docs job, which also pushes to gh-pages.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  track:
    name: Track throughput
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # github-action-benchmark fetches gh-pages and fails if it does not exist.
      # Create an empty one first (in a temp dir, leaving the checkout untouched)
      # so the first run, or a fork, never fails the fetch.
      - name: Ensure gh-pages branch exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages missing; creating an empty branch"
            tmp="$(mktemp -d)"
            git -C "$tmp" init -q
            git -C "$tmp" checkout -q --orphan gh-pages
            git -C "$tmp" commit -q --allow-empty -m "chore: initialize gh-pages"
            git -C "$tmp" push -q \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Measure throughput
        run: node bench/track.mjs

      - name: Publish to gh-pages and alert on regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: csv-pipe throughput
          tool: customBiggerIsBetter
          output-file-path: public/bench-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true

      - name: Build coverage and size badges
        run: |
          npm run coverage
          npx size-limit --json > size.json
          node scripts/status-badges.mjs

      - name: Publish badges to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
